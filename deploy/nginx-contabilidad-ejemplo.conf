# Ejemplo: contabilidad.cafeintimo.mx → Node IntimoAccounting (puerto 3010 o el que uses).
# El 404 en POST /api/facturacion/... suele deberse a que Nginx solo proxifica /api/invoices/
# y el resto de /api cae en try_files estáticos. Solución: un solo bloque para todo /api/.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name contabilidad.cafeintimo.mx;

    # ssl_certificate ... (Certbot)

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 35m;
    }
}
